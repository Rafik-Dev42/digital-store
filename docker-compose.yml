services:
  mysql:
    image: mysql:8.4
    container_name: nexus-store-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexus_store
      MYSQL_USER: nexus
      MYSQL_PASSWORD: nexus
    ports:
      - "3306:3306"
    volumes:
      - nexus_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nexus_mysql_data:
